services:
  vtt:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "4444:4444"
      - "5173:5173"
    volumes:
      - ./src:/app/src
      - ./server:/app/server
      - ./index.html:/app/index.html
      - vtt-data:/app/db
      - vtt-uploads:/app/server/uploads
    environment:
      - PORT=4444

volumes:
  vtt-data:
  vtt-uploads:
