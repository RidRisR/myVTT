name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            revert
          subjectPattern: ^[a-zA-Z].+$
          subjectPatternError: >
            PR title must be in English and start with a letter.
            Example: "feat: add new feature"
